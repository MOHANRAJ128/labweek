codeinsight:
  storage:
    base-path: uploads/projects
app:
  timezone: Asia/Kolkata
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/codeinsight_ai?serverTimezone=Asia/Kolkata
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true

