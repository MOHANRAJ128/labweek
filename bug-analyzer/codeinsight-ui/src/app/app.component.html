
<div class="container">
  <h1>CodeInsight AI</h1>
  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="file1">
        Select Project File:
        <span class="info-icon" title="Upload a project archive in .zip format.">i</span>
      </label>
      <p class="hint-text">Accepted format: .zip</p>
      <input 
        type="file" 
        id="file1" 
        accept=".zip"
        (change)="onFile1Selected($event)"
        required
      />
      <span class="file-name" *ngIf="file1()">Selected: {{ file1()?.name }}</span>
      <p class="error-text" *ngIf="projectFileError()">{{ projectFileError() }}</p>
    </div>

    <div class="form-group">
      <label for="file2">
        Select Error File:
        <span class="info-icon" title="Upload a plain text error log in .txt format.">i</span>
      </label>
      <p class="hint-text">Accepted format: .txt</p>
      <input 
        type="file" 
        id="file2" 
        accept=".txt,text/plain"
        (change)="onFile2Selected($event)"
        required
      />
      <span class="file-name" *ngIf="file2()">Selected: {{ file2()?.name }}</span>
      <p class="error-text" *ngIf="logFileError()">{{ logFileError() }}</p>
    </div>

    <button type="submit" class="submit-btn" [disabled]="!canSubmit()">
      {{ isLoading() ? 'Analyzing...' : 'Upload Files' }}
    </button>
  </form>

  <div class="results-wrapper" *ngIf="!isLoading() && debuggingResponse()">
    <h2 class="results-title">Analysis Results</h2>
    <p class="results-project">Project: {{ debuggingResponse()?.projectName }}</p>
    <app-debugging-results [response]="debuggingResponse()"></app-debugging-results>
  </div>
</div>

<div class="loading-spinner" *ngIf="isLoading()">
  <div class="spinner"></div>
  <p>Analyzing your files...</p>
</div>

<router-outlet />
